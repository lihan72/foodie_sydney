<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lihan's Sydney Foodie List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e8ddd0;
      --text: #2a1f14;
      --text-muted: #9a8070;
      --brown: #5c3d1e;
      --accent: #c87941;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    header {
      background: rgba(250, 247, 242, 0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .nav-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      gap: 12px;
    }

    .nav-logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--brown);
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .nav-home {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-home:hover { color: var(--brown); }

    .nav-controls {
      padding: 0 24px 0;
      border-top: 1px solid var(--border);
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      max-width: 380px;
      padding: 12px 0 10px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    input[type=search] {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      transition: border-color .15s, background .15s;
    }

    input[type=search]:focus {
      border-color: var(--accent);
      background: #fff;
    }

    /* ── FILTER PILLS ── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
    }

    .filters {
      display: flex;
      gap: 7px;
      flex-wrap: nowrap;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }
    .pill:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    /* Category colours */
    .pill[data-cat="all"]        { --c: #c87941; }
    .pill[data-cat="japanese"]   { --c: #e8570a; }
    .pill[data-cat="chinese"]    { --c: #d42b2b; }
    .pill[data-cat="korean"]     { --c: #8b2be2; }
    .pill[data-cat="thai"]       { --c: #c49600; }
    .pill[data-cat="vietnamese"] { --c: #0d8c4a; }
    .pill[data-cat="malaysian"]  { --c: #0077b6; }
    .pill[data-cat="indian"]     { --c: #c05a00; }
    .pill[data-cat="cafe"]       { --c: #6d4c41; }
    .pill[data-cat="bakery"]     { --c: #d4548a; }
    .pill[data-cat="tea"]        { --c: #2a9d6a; }
    .pill[data-cat="western"]    { --c: #455a64; }

    .pill:hover { border-color: var(--c); color: var(--c); }
    .pill.active {
      background: var(--c);
      border-color: var(--c);
      color: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,.18);
    }

    /* ── SUBURB DROPDOWN ── */
    .suburb-select-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .suburb-select-wrap::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    select#suburb {
      appearance: none;
      -webkit-appearance: none;
      padding: 6px 28px 6px 12px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      outline: none;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    select#suburb:focus, select#suburb:hover { border-color: var(--accent); color: var(--text); }
    select#suburb.active { border-color: var(--accent); color: var(--brown); background: #fdf0e3; }



    /* ── MAIN GRID ── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .15s;
      cursor: pointer;
    }

    .card:hover {
      box-shadow: 0 8px 24px rgba(92,61,30,.12);
      transform: translateY(-2px);
    }

    .card-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .card-photo-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #ede9e0 0%, #d8d4cc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }

    .card-body {
      padding: 13px 14px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-name {
      font-size: 0.9rem;
      font-weight: 650;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .card-address {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.35;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 8px;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .rating-star {
      color: #f5a623;
      font-size: 0.75rem;
    }

    .rating-count {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .price {
      font-size: 0.78rem;
      font-weight: 600;
      color: #2a8a4a;
    }

    .card-footer {
      padding: 0 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cat-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.01em;
    }

    .card-links {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .maps-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #4285f4;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1.5px solid #4285f4;
      transition: background .15s, color .15s;
    }
    .maps-btn:hover { background: #4285f4; color: #fff; }

    .insta-btn { color: #c13584; border-color: #c13584; }
    .insta-btn:hover { background: #c13584; color: #fff; }

    /* Category colours */
    .c-japanese   { background:#fff0e6; color:#b85700; }
    .c-chinese    { background:#fff0f0; color:#c03030; }
    .c-korean     { background:#f8f0ff; color:#7b30c0; }
    .c-thai       { background:#fffce0; color:#8a7000; }
    .c-vietnamese { background:#edfff4; color:#1a7a40; }
    .c-malaysian  { background:#e8f6ff; color:#0060a0; }
    .c-indian     { background:#fff5e6; color:#a85200; }
    .c-cafe       { background:#f5ede4; color:#5c3518; }
    .c-bakery     { background:#fff0eb; color:#b85020; }
    .c-tea        { background:#edfaf4; color:#1a6644; }
    .c-western    { background:#f2f2f0; color:#444; }

    /* ── CARD BADGE (visited / want) ── */
    .card { position: relative; }

    .card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 1rem;
      line-height: 1;
      z-index: 2;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.2));
      pointer-events: none;
    }

    .card.status-visited { border-color: #4caf7d; box-shadow: 0 0 0 2px rgba(76,175,125,.2); }
    .card.status-want    { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,121,65,.15); }

    /* ── TOGGLE BUTTON ── */
    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 8px;
      transition: background .15s, transform .1s;
      line-height: 1;
    }
    .toggle-btn:hover { background: var(--warm); transform: scale(1.15); }

    /* ── DETAIL DRAWER ── */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }

    .drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 90vh;
      background: var(--cream);
      border-radius: 24px 24px 0 0;
      overflow-y: auto;
      z-index: 201;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin: 12px auto 0;
    }

    .drawer-inner { padding: 16px 24px 32px; }

    .drawer-photo-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 16px -24px;
      padding: 0 24px;
      scrollbar-width: none;
    }
    .drawer-photo-strip img {
      height: 200px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .drawer-name {
      font-size: 1.15rem;
      font-weight: 750;
      letter-spacing: -0.02em;
      color: var(--brown);
      margin-top: 8px;
    }

    .drawer-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .drawer-note {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      margin-top: 12px;
      padding: 12px 16px;
      background: #fff;
      border-radius: 12px;
      border-left: 3px solid var(--accent);
    }

    .drawer-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .dish-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .dish-row:last-child { border-bottom: none; }

    .dish-verdict {
      font-size: 1rem;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }

    .dish-name {
      font-size: 0.85rem;
      font-weight: 650;
      color: var(--text);
    }

    .dish-note {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .drawer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    /* ── SHARE TOAST ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--brown);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 300;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 40px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      display: none;
    }

    .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .nav-top { padding: 14px 16px; }
      .nav-controls { padding: 0 16px; }
      main { padding: 14px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: 1fr; }
    }


    /* ── PAGE BODY SPLIT ── */
    .page-body {
      display: flex;
      align-items: flex-start;
      max-width: 1600px;
      margin: 0 auto;
    }

    main {
      flex: 1;
      min-width: 0;
      padding: 20px;
    }

    /* ── MAP PANEL ── */
    .map-panel {
      width: 340px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      padding: 16px 16px 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 2px;
    }

    .map-panel-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .map-toggle-btn {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background .15s;
    }
    .map-toggle-btn:hover { background: var(--warm); }

    #map {
      width: 100%;
      height: 560px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(92,61,30,.10);
      overflow: hidden;
    }

    .map-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── MAP PIN MARKERS ── */
    .map-pin {
      background: #fff;
      border: 2px solid var(--border, #e8ddd0);
      border-radius: 12px;
      padding: 5px 8px 3px;
      box-shadow: 0 2px 8px rgba(92,61,30,.15);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
      text-align: center;
      white-space: nowrap;
      transform-origin: bottom center;
    }
    .map-pin:hover {
      transform: translateY(-2px) scale(1.06);
      box-shadow: 0 5px 16px rgba(92,61,30,.25);
      border-color: #c87941;
    }
    .map-pin.active {
      background: #c87941;
      border-color: #c87941;
      box-shadow: 0 4px 14px rgba(200,121,65,.45);
    }
    .map-pin.active .pin-label { color: rgba(255,255,255,.85); }
    .map-pin.dimmed {
      opacity: 0.2;
      transform: scale(0.8);
      pointer-events: none;
    }
    .pin-emojis { font-size: 1.05rem; line-height: 1.25; }
    .pin-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #9a8070;
      margin-top: 1px;
      line-height: 1.2;
    }

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-container { font-family: inherit; background: #faf7f2; }
    .leaflet-control-attribution { font-size: 0.6rem !important; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1000px) {
      .page-body { flex-direction: column; }
      .map-panel {
        width: 100%;
        position: static;
        padding: 0 14px 20px;
        order: -1;
      }
      #map { height: 300px; }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<header>
  <div class="nav-top">
    <a class="nav-logo" href="index.html">🍜 Lihan's Sydney</a>
    <div class="nav-right">
      <span class="header-sub" id="count"></span>
      <a class="nav-home" href="index.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Home
      </a>
    </div>
  </div>
  <div class="nav-controls">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search" placeholder="Search places…" oninput="render()">
    </div>
    <div class="filter-row">
      <div class="filters" id="filters"></div>
      <div class="suburb-select-wrap">
        <select id="suburb" onchange="render()">
          <option value="">📍 All areas</option>
        </select>
      </div>
    </div>
    <div class="filter-row" id="status-filter-row">
      <div class="filters" id="status-filters"></div>
    </div>
  </div>
</header>

<div class="page-body">
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">
      <div class="empty-icon">🔍</div>
      No places found.
    </div>
  </main>
  <aside class="map-panel" id="map-panel">
    <div class="map-panel-header">
      <p class="map-panel-title">📍 Sydney Map</p>
      <button class="map-toggle-btn" id="map-toggle" onclick="toggleMap()">Hide</button>
    </div>
    <div id="map-body">
      <div id="map"></div>
      <p class="map-hint">Click a suburb to filter &nbsp;·&nbsp; click again to clear</p>
    </div>
  </aside>
</div>

<script>


const CATS = [
  { id:"all",        label:"All" },
  { id:"japanese",   label:"🍜 Japanese" },
  { id:"chinese",    label:"🥢 Chinese" },
  { id:"korean",     label:"🥩 Korean" },
  { id:"thai",       label:"🌶️ Thai" },
  { id:"vietnamese", label:"🥖 Vietnamese" },
  { id:"malaysian",  label:"🍛 Malaysian" },
  { id:"indian",     label:"🫓 Indian" },
  { id:"cafe",       label:"☕ Cafe" },
  { id:"bakery",     label:"🥐 Bakery" },
  { id:"tea",        label:"🧋 Tea & Drinks" },
  { id:"western",    label:"🍽️ Western" },
];

const CAT_LABEL = {
  japanese:"Japanese", chinese:"Chinese", korean:"Korean",
  thai:"Thai", vietnamese:"Vietnamese", malaysian:"Malaysian",
  indian:"Indian", cafe:"Cafe", bakery:"Bakery", tea:"Tea & Drinks", western:"Western",
};

const CAT_EMOJI = {
  japanese:"🍜", chinese:"🥢", korean:"🥩", thai:"🌶️",
  vietnamese:"🥖", malaysian:"🍛", indian:"🫓",
  cafe:"☕", bakery:"🥐", tea:"🧋", western:"🍽️",
};

let activeFilter = "all";
let activeStatus = "all";
const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";

function stars(r) {
  if (!r) return "";
  const full = Math.floor(r);
  const half = r - full >= 0.3 ? 1 : 0;
  const empty = 5 - full - half;
  return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty);
}

function price(p) {
  if (p == null) return "";
  return "$".repeat(p + 1);
}

function shortAddr(addr) {
  if (!addr) return "";
  return addr.replace(", Australia", "").replace(", NSW", "").replace(" NSW", "");
}

function getSuburb(addr) {
  if (!addr) return "";
  const m = addr.match(/,\s*([^,]+?)\s+NSW\s+\d/);
  return m ? m[1].trim() : "";
}

function buildFilters() {
  document.getElementById("filters").innerHTML = CATS.map(c =>
    `<button class="pill${c.id === activeFilter ? " active" : ""}" data-cat="${c.id}" onclick="setFilter('${c.id}')">${c.label}</button>`
  ).join("");
}

function buildSuburbSelect() {
  const sel = document.getElementById("suburb");
  const current = sel.value;
  const suburbs = [...new Set(ALL.map(p => getSuburb(p.address)).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">📍 All areas</option>' +
    suburbs.map(s => `<option value="${s}"${s === current ? " selected" : ""}>${s}</option>`).join("");
}

function setFilter(id) {
  activeFilter = id;
  buildFilters();
  render();
}

const STATUS_PILLS = [
  { id: "all",     label: "All places" },
  { id: "want",    label: "🔖 Want to go" },
  { id: "visited", label: "✅ Visited" },
];

function buildStatusFilters() {
  document.getElementById("status-filters").innerHTML = STATUS_PILLS.map(s =>
    `<button class="pill${s.id === activeStatus ? " active" : ""}" onclick="setStatus('${s.id}')">${s.label}</button>`
  ).join("");
}

function setStatus(id) {
  activeStatus = id;
  buildStatusFilters();
  render();
}

function render() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const suburb = document.getElementById("suburb").value;
  const list = ALL.filter(p => {
    const matchCat = activeFilter === "all" || p.cat === activeFilter;
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.address || "").toLowerCase().includes(q);
    const matchSuburb = !suburb || getSuburb(p.address) === suburb;
    const matchStatus = activeStatus === "all" || (REVIEWS[p.name] || {}).status === activeStatus;
    return matchCat && matchQ && matchSuburb && matchStatus;
  });
  document.getElementById("suburb").className = suburb ? "active" : "";
  if (leafletMap) {
    updateMapMarkers();
    if (suburb && SUBURB_COORDS[suburb]) {
      leafletMap.flyTo(SUBURB_COORDS[suburb], 14, { duration: 0.8 });
    } else if (!suburb) {
      leafletMap.flyTo([-33.865, 151.170], 12, { duration: 0.8 });
    }
  }

  document.getElementById("count").textContent = list.length + " places";

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  if (!list.length) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = list.map(p => {
    const photo = p.photo
      ? `<img class="card-photo" src="${p.photo}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : "";
    const placeholder = `<div class="card-photo-placeholder" ${p.photo ? 'style="display:none"' : ""}>${CAT_EMOJI[p.cat] || "🍴"}</div>`;

    const ratingHtml = p.rating
      ? `<span class="rating">
           <span class="rating-star">★</span>
           ${p.rating}
           ${p.ratingCount ? `<span class="rating-count">(${p.ratingCount >= 1000 ? (p.ratingCount/1000).toFixed(1)+"k" : p.ratingCount})</span>` : ""}
         </span>`
      : "";

    const priceHtml = p.priceLevel != null
      ? `<span class="price">${price(p.priceLevel)}</span>`
      : "";

    const suburb = getSuburb(p.address);
    const rev = REVIEWS[p.name] || {};
    const status = rev.status || "";
    const badgeIcon = status === "visited" ? "✅" : status === "want" ? "🔖" : "";
    const toggleIcon = status === "visited" ? "✅" : status === "want" ? "🔖" : "＋";
    const toggleTitle = status === "visited" ? "Visited" : status === "want" ? "Want to go" : "Mark this place";
    const cardClick = status === "visited"
      ? `openDrawer('${p.name.replace(/'/g, "\\'")}')`
      : `focusSuburb('${suburb.replace(/'/g, "\\'")}')`;

    return `
      <div class="card status-${status}" id="card-${slugify(p.name)}" onclick="${cardClick}">
        ${badgeIcon ? `<div class="card-badge">${badgeIcon}</div>` : ""}
        ${photo}${placeholder}
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          ${p.address ? `<div class="card-address">${shortAddr(p.address)}</div>` : ""}
          <div class="card-meta">${ratingHtml}${priceHtml}</div>
        </div>
        <div class="card-footer">
          <span class="cat-tag c-${p.cat}">${CAT_LABEL[p.cat]}</span>
          <div class="card-links" onclick="event.stopPropagation()">
            ${IS_LOCAL ? `<button class="toggle-btn" onclick="cycleStatus('${p.name.replace(/'/g, "\\'")}', event)" title="${toggleTitle}">${toggleIcon}</button>` : ""}
            ${p.website ? `<a class="maps-btn" href="${p.website}" target="_blank" rel="noopener" title="Official website">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              Website
            </a>` : ""}
            ${p.instagram ? `<a class="maps-btn insta-btn" href="https://instagram.com/${p.instagram}" target="_blank" rel="noopener" title="Instagram">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
              Instagram
            </a>` : ""}
            <a class="maps-btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}&query_place_id=${p.mapsUrl.split('place_id:')[1] || ''}" target="_blank" rel="noopener" title="Google Maps">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              Maps
            </a>
            <button class="maps-btn" onclick="sharePlace('${p.name.replace(/'/g, "\\'")}', event)" title="Share">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share
            </button>
          </div>
        </div>
      </div>`;
  }).join("");
}

let ALL = [];
let REVIEWS = {};
let leafletMap = null;
let mapMarkers = {};

Promise.all([
  fetch("data/places.json").then(r => r.json()),
  fetch("data/reviews.json").then(r => r.json()),
]).then(([places, reviews]) => {
  ALL = places;
  REVIEWS = reviews;
  buildFilters();
  buildStatusFilters();
  buildSuburbSelect();
  render();
  initMap();
  handleShareParam();
});

// ── SUBURB COORDINATES (approximate) ────────────────────────────────────
const SUBURB_COORDS = {
  "Alexandria":     [-33.909, 151.197],
  "Artarmon":       [-33.819, 151.189],
  "Barangaroo":     [-33.862, 151.200],
  "Botany":         [-33.944, 151.202],
  "Burwood":        [-33.877, 151.104],
  "Cabramatta":     [-33.894, 150.939],
  "Chatswood":      [-33.797, 151.182],
  "Chippendale":    [-33.889, 151.198],
  "Crows Nest":     [-33.827, 151.200],
  "Darling Harbour":[-33.873, 151.199],
  "Darlinghurst":   [-33.876, 151.219],
  "Eastwood":       [-33.790, 151.081],
  "Erskineville":   [-33.900, 151.185],
  "Glebe":          [-33.880, 151.186],
  "Haymarket":      [-33.880, 151.204],
  "Mascot":         [-33.927, 151.191],
  "Neutral Bay":    [-33.834, 151.221],
  "Newtown":        [-33.897, 151.177],
  "North Sydney":   [-33.840, 151.207],
  "Potts Point":    [-33.870, 151.226],
  "Redfern":        [-33.893, 151.201],
  "St Leonards":    [-33.822, 151.195],
  "Surry Hills":    [-33.885, 151.212],
  "Sydney":         [-33.869, 151.207],
  "The Rocks":      [-33.860, 151.208],
  "Ultimo":         [-33.881, 151.197],
  "Waterloo":       [-33.897, 151.202],
  "Zetland":        [-33.911, 151.207],
};

function makePinIcon(suburb, cats, isActive, isDimmed) {
  const emojis = cats.slice(0, 4).map(c => CAT_EMOJI[c] || "🍴").join("");
  const cls = ["map-pin", isActive ? "active" : "", isDimmed ? "dimmed" : ""].filter(Boolean).join(" ");
  const html = `<div class="${cls}">
    <div class="pin-emojis">${emojis}</div>
    <div class="pin-label">${suburb}</div>
  </div>`;
  return L.divIcon({ className: "", html, iconSize: null, iconAnchor: [36, 52] });
}

function initMap() {
  // Group ALL places by suburb → unique categories
  const suburbCats = {};
  ALL.forEach(p => {
    const s = getSuburb(p.address);
    if (!s || !SUBURB_COORDS[s]) return;
    if (!suburbCats[s]) suburbCats[s] = [];
    if (!suburbCats[s].includes(p.cat)) suburbCats[s].push(p.cat);
  });

  leafletMap = L.map("map", {
    center: [-33.865, 151.170],
    zoom: 12,
    zoomControl: true,
    scrollWheelZoom: false,
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 17,
  }).addTo(leafletMap);

  Object.entries(suburbCats).forEach(([suburb, cats]) => {
    const coords = SUBURB_COORDS[suburb];
    if (!coords) return;
    const marker = L.marker(coords, {
      icon: makePinIcon(suburb, cats, false),
      zIndexOffset: 0,
    }).addTo(leafletMap);

    marker.on("click", () => {
      const sel = document.getElementById("suburb");
      sel.value = sel.value === suburb ? "" : suburb;
      render();
      // Scroll back to top of grid on mobile
      if (window.innerWidth < 1000) {
        document.querySelector("main").scrollIntoView({ behavior: "smooth" });
      }
    });

    mapMarkers[suburb] = { marker, cats };
  });
}

function updateMapMarkers() {
  const activeSuburb = document.getElementById("suburb").value;
  Object.entries(mapMarkers).forEach(([suburb, { marker, cats }]) => {
    const isActive   = suburb === activeSuburb;
    // Which cats are visible under the current category filter?
    const visibleCats = activeFilter === "all"
      ? cats
      : cats.filter(c => c === activeFilter);
    const isDimmed = activeFilter !== "all" && visibleCats.length === 0;
    // Show filtered emoji when a category is active, else all emojis
    const displayCats = visibleCats.length > 0 ? visibleCats : cats;
    marker.setIcon(makePinIcon(suburb, displayCats, isActive, isDimmed));
    marker.setZIndexOffset(isActive ? 1000 : isDimmed ? -200 : 0);
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────
function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}

// ── CYCLE STATUS (toggle button) ─────────────────────────────────────────
function cycleStatus(name, e) {
  e.stopPropagation();
  const rev = REVIEWS[name] || {};
  const cur = rev.status || "";
  const next = cur === "" ? "want" : cur === "want" ? "visited" : "";
  if (next) {
    REVIEWS[name] = { ...rev, status: next };
  } else {
    const { status: _, ...rest } = rev;
    REVIEWS[name] = Object.keys(rest).length ? rest : undefined;
    if (!REVIEWS[name]) delete REVIEWS[name];
  }
  render();
}

// ── DRAWER ───────────────────────────────────────────────────────────────
const VERDICT_ICON = { must: "🔥", okay: "👍", skip: "👎" };
const VERDICT_LABEL = { must: "Must try", okay: "It's okay", skip: "Skip" };

function openDrawer(name) {
  const p = ALL.find(x => x.name === name);
  const rev = REVIEWS[name] || {};
  if (!p) return;

  const photosHtml = (rev.photos || []).length
    ? `<div class="drawer-photo-strip">${rev.photos.map(f =>
        `<img src="photos/${f}" alt="${name}">`).join("")}</div>`
    : "";

  const noteHtml = rev.note
    ? `<div class="drawer-note">"${rev.note}"</div>`
    : "";

  const dishesHtml = (rev.dishes || []).length
    ? `<div class="drawer-section-title">Dish breakdown</div>
       ${rev.dishes.map(d => `
        <div class="dish-row">
          <div class="dish-verdict" title="${VERDICT_LABEL[d.verdict]}">${VERDICT_ICON[d.verdict] || "•"}</div>
          <div>
            <div class="dish-name">${d.name}</div>
            ${d.note ? `<div class="dish-note">${d.note}</div>` : ""}
          </div>
        </div>`).join("")}`
    : "";

  const actionsHtml = `
    <div class="drawer-actions">
      ${p.website ? `<a class="maps-btn" href="${p.website}" target="_blank" rel="noopener">🌐 Website</a>` : ""}
      ${p.instagram ? `<a class="maps-btn insta-btn" href="https://instagram.com/${p.instagram}" target="_blank" rel="noopener">📷 Instagram</a>` : ""}
      <a class="maps-btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}&query_place_id=${p.mapsUrl.split('place_id:')[1] || ''}" target="_blank" rel="noopener">📍 Maps</a>
      <button class="maps-btn" onclick="sharePlace('${name.replace(/'/g, "\\'")}', event)">🔗 Share</button>
    </div>`;

  document.getElementById("drawer-inner").innerHTML = `
    ${photosHtml}
    <div class="drawer-name">${name}</div>
    ${rev.date ? `<div class="drawer-date">Visited ${rev.date}</div>` : ""}
    ${noteHtml}
    ${dishesHtml}
    ${actionsHtml}
  `;

  document.getElementById("drawer-overlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDrawer() {
  document.getElementById("drawer-overlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
  document.body.style.overflow = "";
}

// close drawer on Escape key
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

// ── SHARE ────────────────────────────────────────────────────────────────
function sharePlace(name, e) {
  e.stopPropagation();
  const slug = slugify(name);
  const url = `${location.origin}${location.pathname}?place=${slug}`;

  if (navigator.share) {
    navigator.share({ title: name, text: `Check out ${name} on Lihan's Sydney Foodie Guide`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast("Link copied!"));
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ── SHARE URL PARAM ──────────────────────────────────────────────────────
function handleShareParam() {
  const slug = new URLSearchParams(location.search).get("place");
  if (!slug) return;
  const card = document.getElementById(`card-${slug}`);
  if (!card) return;
  card.scrollIntoView({ behavior: "smooth", block: "center" });
  card.style.outline = `3px solid var(--accent)`;
  setTimeout(() => card.style.outline = "", 2500);
}

function focusSuburb(suburb) {
  if (!leafletMap || !suburb || !SUBURB_COORDS[suburb]) return;
  // Show map if hidden
  const body = document.getElementById("map-body");
  if (body.style.display === "none") toggleMap();
  // Fly to suburb
  leafletMap.flyTo(SUBURB_COORDS[suburb], 15, { duration: 0.8 });
  // Highlight the marker briefly
  if (mapMarkers[suburb]) {
    const { marker } = mapMarkers[suburb];
    marker.setZIndexOffset(2000);
    setTimeout(() => marker.setZIndexOffset(0), 2000);
  }
}

function toggleMap() {
  const body = document.getElementById("map-body");
  const btn = document.getElementById("map-toggle");
  const hidden = body.style.display === "none";
  body.style.display = hidden ? "" : "none";
  btn.textContent = hidden ? "Hide" : "Show map";
  if (hidden && leafletMap) leafletMap.invalidateSize();
}

// Sync sticky map panel top with header height
window.addEventListener("load", () => {
  const hh = document.querySelector("header").offsetHeight;
  document.querySelector(".map-panel").style.top = hh + "px";
});

</script>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-inner" id="drawer-inner"></div>
</div>
<div class="toast" id="toast"></div>

<footer>Made with 🍜 and a lot of Google Maps pins &nbsp;·&nbsp; Lihan's Sydney Foodie Guide</footer>
</body>
