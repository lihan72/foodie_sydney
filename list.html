<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lihan's Sydney Foodie List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e8ddd0;
      --text: #2a1f14;
      --text-muted: #9a8070;
      --brown: #5c3d1e;
      --accent: #c87941;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    header {
      background: rgba(250, 247, 242, 0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .nav-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      gap: 12px;
    }

    .nav-logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--brown);
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .nav-home {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-home:hover { color: var(--brown); }

    .nav-controls {
      padding: 0 24px 0;
      border-top: 1px solid var(--border);
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      max-width: 380px;
      padding: 12px 0 10px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    input[type=search] {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      transition: border-color .15s, background .15s;
    }

    input[type=search]:focus {
      border-color: var(--accent);
      background: #fff;
    }

    /* ── FILTER PILLS ── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
    }

    .filters {
      display: flex;
      gap: 7px;
      flex-wrap: nowrap;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .pill {
      --c: var(--accent);
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }
    .pill:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.08); border-color: var(--c); color: var(--c); }
    .pill.active {
      background: var(--c);
      border-color: var(--c);
      color: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,.18);
    }

    /* ── CUISINE DROPDOWN ── */
    .cat-select-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .cat-select-wrap::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    select#cat {
      appearance: none;
      -webkit-appearance: none;
      padding: 6px 28px 6px 12px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      outline: none;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    select#cat:focus, select#cat:hover { border-color: var(--accent); color: var(--text); }
    select#cat.active { border-color: var(--accent); color: var(--brown); background: #fdf0e3; }

    /* ── SUBURB DROPDOWN ── */
    .suburb-select-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .suburb-select-wrap::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    select#suburb {
      appearance: none;
      -webkit-appearance: none;
      padding: 6px 28px 6px 12px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      outline: none;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    select#suburb:focus, select#suburb:hover { border-color: var(--accent); color: var(--text); }
    select#suburb.active { border-color: var(--accent); color: var(--brown); background: #fdf0e3; }



    /* ── MAIN GRID ── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .15s;
      cursor: pointer;
    }

    .card:hover {
      box-shadow: 0 8px 24px rgba(92,61,30,.12);
      transform: translateY(-2px);
    }

    .card-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .card-photo-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #ede9e0 0%, #d8d4cc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }

    .card-body {
      padding: 13px 14px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-name {
      font-size: 0.9rem;
      font-weight: 650;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .card-address {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.35;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 8px;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .rating-star {
      color: #f5a623;
      font-size: 0.75rem;
    }

    .rating-count {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .card-ratings {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .rating-divider {
      width: 1px; height: 12px;
      background: var(--border);
      flex-shrink: 0;
    }

    .personal-rating {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
    }

    .personal-rating-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .price {
      font-size: 0.78rem;
      font-weight: 600;
      color: #2a8a4a;
    }

    .card-footer {
      padding: 0 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cat-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.01em;
    }

    .card-links {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .maps-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #4285f4;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1.5px solid #4285f4;
      transition: background .15s, color .15s;
    }
    .maps-btn:hover { background: #4285f4; color: #fff; }

    .insta-btn { color: #c13584; border-color: #c13584; }
    .insta-btn:hover { background: #c13584; color: #fff; }

    /* Category colours */
    .c-japanese   { background:#fff0e6; color:#b85700; }
    .c-chinese    { background:#fff0f0; color:#c03030; }
    .c-korean     { background:#f8f0ff; color:#7b30c0; }
    .c-thai       { background:#fffce0; color:#8a7000; }
    .c-vietnamese { background:#edfff4; color:#1a7a40; }
    .c-malaysian  { background:#e8f6ff; color:#0060a0; }
    .c-indian     { background:#fff5e6; color:#a85200; }
    .c-cafe       { background:#f5ede4; color:#5c3518; }
    .c-bakery     { background:#fff0eb; color:#b85020; }
    .c-tea        { background:#edfaf4; color:#1a6644; }
    .c-western    { background:#f2f2f0; color:#444; }

    /* ── CARD BADGE (visited / want) ── */
    .card { position: relative; }

    .card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 1rem;
      line-height: 1;
      z-index: 2;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.2));
      pointer-events: none;
    }

    .card.status-visited { border-color: #4caf7d; box-shadow: 0 0 0 2px rgba(76,175,125,.2); }
    .card.status-want    { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,121,65,.15); }

    /* ── TOGGLE BUTTON ── */
    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 8px;
      transition: background .15s, transform .1s;
      line-height: 1;
    }
    .toggle-btn:hover { background: var(--warm); transform: scale(1.15); }

    /* ── DETAIL DRAWER ── */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }

    .drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 90vh;
      background: #faf7f2;
      border-radius: 24px 24px 0 0;
      overflow-y: auto;
      z-index: 201;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin: 12px auto 0;
    }

    .drawer-inner { padding: 16px 24px 32px; }

    .drawer-photo-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 16px -24px;
      padding: 0 24px;
      scrollbar-width: none;
    }
    .drawer-photo-strip img {
      height: 200px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .drawer-name {
      font-size: 1.15rem;
      font-weight: 750;
      letter-spacing: -0.02em;
      color: var(--brown);
      margin-top: 8px;
    }

    .drawer-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .drawer-note {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      margin-top: 12px;
      padding: 12px 16px;
      background: #fff;
      border-radius: 12px;
      border-left: 3px solid var(--accent);
    }

    .drawer-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .dish-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .dish-row:last-child { border-bottom: none; }

    .dish-verdict {
      font-size: 1rem;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }

    .dish-name {
      font-size: 0.85rem;
      font-weight: 650;
      color: var(--text);
    }

    .dish-note {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .drawer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    /* ── SHARE TOAST ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--brown);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 300;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── EDIT MODE BANNER ── */
    .edit-banner {
      display: none;
      background: #2a9d6a;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      text-align: center;
      padding: 6px 16px;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }
    .edit-banner.show { display: flex; }
    .edit-banner button {
      background: rgba(255,255,255,.25);
      border: none;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      cursor: pointer;
    }
    .edit-banner button:hover { background: rgba(255,255,255,.4); }

    .lock-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .lock-btn:hover { border-color: var(--accent); color: var(--accent); }
    .lock-btn.active { border-color: #2a9d6a; color: #2a9d6a; background: #edfaf4; }

    /* ── PASSWORD MODAL ── */
    .pwd-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .pwd-modal-overlay.open { display: flex; }
    .pwd-modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 24px;
      width: 320px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .pwd-modal h3 { font-size: 1rem; font-weight: 700; color: var(--brown); margin-bottom: 6px; }
    .pwd-modal p { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 16px; }
    .pwd-modal input[type=password] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .15s;
      font-family: inherit;
    }
    .pwd-modal input[type=password]:focus { border-color: var(--accent); }
    .pwd-modal input[type=password].error { border-color: #e53e3e; animation: shake .3s; }
    .pwd-modal-btns { display: flex; gap: 8px; }
    .pwd-modal-btns button {
      flex: 1; padding: 10px; border-radius: 10px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none;
    }
    .pwd-modal-btns .btn-unlock { background: var(--accent); color: #fff; }
    .pwd-modal-btns .btn-close-pwd { background: var(--bg); color: var(--text-muted); border: 1.5px solid var(--border) !important; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* ── EDIT FORM ── */
    .edit-form { display: flex; flex-direction: column; gap: 16px; padding-top: 4px; }
    .edit-form-title { font-size: 1rem; font-weight: 700; color: var(--brown); }
    .edit-field label {
      display: block; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .edit-field input[type=text], .edit-field textarea {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.88rem; font-family: inherit; outline: none;
      background: var(--bg); color: var(--text); transition: border-color .15s;
    }
    .edit-field input[type=text]:focus,
    .edit-field textarea:focus { border-color: var(--accent); background: #fff; }
    .edit-field textarea { resize: vertical; min-height: 80px; }

    .status-radios { display: flex; gap: 8px; }
    .status-radios label {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 8px; border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--text-muted);
      transition: all .15s; text-transform: none; letter-spacing: 0;
    }
    .status-radios input[type=radio] { display: none; }
    .status-radios label:has(input:checked) { border-color: var(--accent); background: #fdf0e3; color: var(--accent); }

    .dish-editor { display: flex; flex-direction: column; gap: 8px; }
    .dish-edit-row {
      display: grid; grid-template-columns: 1fr auto 1fr auto;
      gap: 6px; align-items: center;
      background: var(--bg); padding: 8px 10px;
      border-radius: 10px; border: 1px solid var(--border);
    }
    .dish-edit-row input, .dish-edit-row select {
      padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 7px; font-size: 0.8rem; font-family: inherit;
      outline: none; background: #fff;
    }
    .dish-edit-row .remove-dish {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1rem; padding: 2px 4px;
      border-radius: 6px; transition: color .15s, background .15s;
    }
    .dish-edit-row .remove-dish:hover { color: #e53e3e; background: #fff0f0; }

    .add-dish-btn {
      background: none; border: 1.5px dashed var(--border);
      border-radius: 10px; padding: 8px; width: 100%;
      font-size: 0.82rem; font-weight: 600; color: var(--text-muted);
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .add-dish-btn:hover { border-color: var(--accent); color: var(--accent); }

    .photo-upload-area {
      border: 1.5px dashed var(--border); border-radius: 12px;
      padding: 14px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s; margin-top: 8px;
    }
    .photo-upload-area:hover { border-color: var(--accent); background: #fdf0e3; }
    .photo-upload-area input { display: none; }
    .photo-upload-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 600; cursor: pointer; }

    .photo-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .photo-thumb-wrap { position: relative; width: 72px; height: 72px; }
    .photo-thumb-wrap img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; }
    .photo-thumb-wrap .remove-photo {
      position: absolute; top: -6px; right: -6px;
      background: #e53e3e; color: #fff; border: none; border-radius: 50%;
      width: 20px; height: 20px; font-size: 0.65rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-thumb-wrap.uploading img { opacity: 0.4; }
    .photo-thumb-wrap.uploading::after {
      content: "⏳"; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.2rem;
    }

    .edit-form-btns { display: flex; gap: 8px; margin-top: 4px; }
    .edit-form-btns button {
      flex: 1; padding: 11px; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer; border: none;
    }
    .btn-save { background: var(--accent); color: #fff; }
    .btn-save:hover { opacity: 0.9; }
    .btn-cancel-edit { background: var(--bg); color: var(--text-muted); border: 1.5px solid var(--border) !important; }

    .edit-btn {
      background: none; border: 1.5px solid var(--accent); color: var(--accent);
      padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .edit-btn:hover { background: var(--accent); color: #fff; }
    .remove-btn { border-color: #e53e3e; color: #e53e3e; }
    .remove-btn:hover { background: #e53e3e; color: #fff; }

    /* ── RATINGS ── */
    .ratings-display { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .rating-entry {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; background: #fff; border-radius: 10px;
      border: 1px solid var(--border);
    }
    .rater-name { font-size: 0.85rem; font-weight: 650; color: var(--text); }
    .rater-stars { font-size: 1rem; color: #f5a623; letter-spacing: 1px; }

    .rating-edit-row {
      display: flex; flex-direction: column; gap: 7px;
      background: var(--bg); padding: 10px 12px;
      border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px;
    }
    .rating-top {
      display: flex; align-items: center; gap: 8px;
    }
    .from-label {
      font-size: 0.75rem; font-weight: 700; color: var(--text-muted);
      white-space: nowrap; flex-shrink: 0;
    }
    .rating-edit-row input {
      padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 7px; font-size: 0.8rem; font-family: inherit;
      outline: none; background: #fff; width: 100%;
    }
    .rater-dish-input::placeholder { color: #bbb; }
    .star-picker { display: flex; gap: 1px; cursor: pointer; flex-shrink: 0; }
    .sp-star { font-size: 1.3rem; color: #ddd; transition: color .1s; user-select: none; }
    .sp-star.on { color: #f5a623; }

    /* ── ADD PLACE FAB ── */
    .add-place-fab {
      display: none;
      position: fixed;
      bottom: 28px;
      right: 24px;
      z-index: 150;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 13px 20px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,121,65,.5);
      transition: transform .15s, box-shadow .15s;
    }
    .add-place-fab.show { display: flex; align-items: center; gap: 6px; }
    .add-place-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(200,121,65,.6); }

    /* ── ADD PLACE FORM (in drawer) ── */
    .add-place-form { display: flex; flex-direction: column; gap: 14px; padding-top: 4px; }
    .add-place-form .edit-form-title { font-size: 1rem; font-weight: 700; color: var(--brown); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .add-place-form select {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.88rem; font-family: inherit; outline: none;
      background: var(--bg); color: var(--text); cursor: pointer;
      transition: border-color .15s;
    }
    .add-place-form select:focus { border-color: var(--accent); background: #fff; }

    /* ── GALLERY VIEW ── */
    .gallery-grid {
      display: none;
      columns: 3;
      column-gap: 12px;
      padding: 4px 0 20px;
    }
    .gallery-grid.show { display: block; }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 12px;
      cursor: pointer;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      background: var(--border);
    }
    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform .25s;
    }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(42,31,20,.75));
      color: #fff;
      padding: 24px 10px 9px;
      font-size: 0.78rem;
      font-weight: 650;
    }
    .gallery-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    @media (max-width: 640px) {
      .gallery-grid { columns: 2; }
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 40px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      display: none;
    }

    .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .nav-top { padding: 14px 16px; }
      .nav-controls { padding: 0 16px; }
      main { padding: 14px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: 1fr; }
    }


    /* ── PAGE BODY SPLIT ── */
    .page-body {
      display: flex;
      align-items: flex-start;
      max-width: 1600px;
      margin: 0 auto;
    }

    main {
      flex: 1;
      min-width: 0;
      padding: 20px;
    }

    /* ── MAP PANEL ── */
    .map-panel {
      width: 340px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      padding: 16px 16px 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 2px;
    }

    .map-panel-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .map-toggle-btn {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background .15s;
    }
    .map-toggle-btn:hover { background: var(--warm); }

    #map {
      width: 100%;
      height: 560px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(92,61,30,.10);
      overflow: hidden;
    }

    .map-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── MAP PIN MARKERS ── */
    .map-pin {
      background: #fff;
      border: 2px solid var(--border, #e8ddd0);
      border-radius: 12px;
      padding: 5px 8px 3px;
      box-shadow: 0 2px 8px rgba(92,61,30,.15);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
      text-align: center;
      white-space: nowrap;
      transform-origin: bottom center;
    }
    .map-pin:hover {
      transform: translateY(-2px) scale(1.06);
      box-shadow: 0 5px 16px rgba(92,61,30,.25);
      border-color: #c87941;
    }
    .map-pin.active {
      background: #c87941;
      border-color: #c87941;
      box-shadow: 0 4px 14px rgba(200,121,65,.45);
    }
    .map-pin.active .pin-label { color: rgba(255,255,255,.85); }
    .map-pin.dimmed {
      opacity: 0.2;
      transform: scale(0.8);
      pointer-events: none;
    }
    .pin-emojis { font-size: 1.05rem; line-height: 1.25; }
    .pin-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #9a8070;
      margin-top: 1px;
      line-height: 1.2;
    }

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-container { font-family: inherit; background: #faf7f2; }
    .leaflet-control-attribution { font-size: 0.6rem !important; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1000px) {
      .page-body { flex-direction: column; }
      .map-panel {
        width: 100%;
        position: static;
        padding: 0 14px 20px;
        order: -1;
      }
      #map { height: 300px; }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<script>

const SUPABASE_URL  = 'https://asoztecurnpmqfbvjago.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzb3p0ZWN1cm5wbXFmYnZqYWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTc5NDcsImV4cCI6MjA5MzI5Mzk0N30.r413pVPiLhAE0od3Wm1JEDYmtk5ka7eUKmqaN4bSmPs';
const CLD_CLOUD     = 'dgx67nyjd';
const CLD_PRESET    = 'Foodie_sydney_photo';
const EDIT_HASH     = 'eca566b868dbf4a32b82de9aadac999f1b0770a227a59f15aeef2cc13354186f';

const CATS = [
  { id:"all",        label:"All" },
  { id:"japanese",   label:"🍜 Japanese" },
  { id:"chinese",    label:"🥢 Chinese" },
  { id:"korean",     label:"🥩 Korean" },
  { id:"thai",       label:"🌶️ Thai" },
  { id:"vietnamese", label:"🥖 Vietnamese" },
  { id:"malaysian",  label:"🍛 Malaysian" },
  { id:"indian",     label:"🫓 Indian" },
  { id:"cafe",       label:"☕ Cafe" },
  { id:"bakery",     label:"🥐 Bakery" },
  { id:"tea",        label:"🧋 Tea & Drinks" },
  { id:"western",    label:"🍽️ Western" },
];

const CAT_LABEL = {
  japanese:"Japanese", chinese:"Chinese", korean:"Korean",
  thai:"Thai", vietnamese:"Vietnamese", malaysian:"Malaysian",
  indian:"Indian", cafe:"Cafe", bakery:"Bakery", tea:"Tea & Drinks", western:"Western",
};

const CAT_EMOJI = {
  japanese:"🍜", chinese:"🥢", korean:"🥩", thai:"🌶️",
  vietnamese:"🥖", malaysian:"🍛", indian:"🫓",
  cafe:"☕", bakery:"🥐", tea:"🧋", western:"🍽️",
};

let activeFilter = "all";
let activeStatus = "all";
let editMode = sessionStorage.getItem('editMode') === '1';

function stars(r) {
  if (!r) return "";
  const full = Math.floor(r);
  const half = r - full >= 0.3 ? 1 : 0;
  const empty = 5 - full - half;
  return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty);
}

function price(p) {
  if (p == null) return "";
  return "$".repeat(p + 1);
}

function shortAddr(addr) {
  if (!addr) return "";
  return addr.replace(", Australia", "").replace(", NSW", "").replace(" NSW", "");
}

function getSuburb(addr) {
  if (!addr) return "";
  const m = addr.match(/,\s*([^,]+?)\s+NSW\s+\d/);
  return m ? m[1].trim() : "";
}

function buildFilters() {
  const sel = document.getElementById("cat");
  sel.value = activeFilter;
  sel.className = activeFilter !== "all" ? "active" : "";
}

function buildSuburbSelect() {
  const sel = document.getElementById("suburb");
  const current = sel.value;
  const suburbs = [...new Set(ALL.map(p => getSuburb(p.address)).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">📍 All areas</option>' +
    suburbs.map(s => `<option value="${s}"${s === current ? " selected" : ""}>${s}</option>`).join("");
}

function setFilter(id) {
  activeFilter = id;
  buildFilters();
  if (activeStatus === 'gallery') { setStatus('all'); return; }
  render();
}

const STATUS_PILLS = [
  { id: "all",      label: "All places" },
  { id: "want",     label: "🔖 Want to go" },
  { id: "visited",  label: "✅ Visited" },
  { id: "reviewed", label: "📝 Has review" },
  { id: "gallery",  label: "📷 Gallery" },
];

function buildStatusFilters() {
  document.getElementById("status-filters").innerHTML = STATUS_PILLS.map(s =>
    `<button class="pill${s.id === activeStatus ? " active" : ""}" onclick="setStatus('${s.id}')">${s.label}</button>`
  ).join("");
}

function setStatus(id) {
  activeStatus = id;
  buildStatusFilters();
  render();
}

function render() {
  const gallery = document.getElementById('gallery-grid');
  const grid    = document.getElementById('grid');
  const empty   = document.getElementById('empty');

  if (activeStatus === 'gallery') {
    grid.style.display   = 'none';
    empty.style.display  = 'none';
    gallery.classList.add('show');
    renderGallery();
    document.getElementById("count").textContent = "Gallery";
    return;
  }
  grid.style.display  = '';
  gallery.classList.remove('show');

  const q = document.getElementById("search").value.toLowerCase().trim();
  const suburb = document.getElementById("suburb").value;
  const list = ALL.filter(p => {
    const matchCat = activeFilter === "all" || p.cat === activeFilter;
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.address || "").toLowerCase().includes(q);
    const matchSuburb = !suburb || getSuburb(p.address) === suburb;
    const rev = REVIEWS[p.name] || {};
    const matchStatus = activeStatus === "all"
      || (activeStatus === "reviewed"
          ? (rev.note || (rev.dishes||[]).length || (rev.photos||[]).length)
          : rev.status === activeStatus);
    return matchCat && matchQ && matchSuburb && matchStatus;
  });
  document.getElementById("suburb").className = suburb ? "active" : "";
  if (leafletMap) {
    updateMapMarkers();
    if (suburb && SUBURB_COORDS[suburb]) {
      leafletMap.flyTo(SUBURB_COORDS[suburb], 14, { duration: 0.8 });
    } else if (!suburb) {
      leafletMap.flyTo([-33.865, 151.170], 12, { duration: 0.8 });
    }
  }

  document.getElementById("count").textContent = list.length + " places";

  if (!list.length) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = list.map(p => {
    const photo = p.photo
      ? `<img class="card-photo" src="${p.photo}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : "";
    const placeholder = `<div class="card-photo-placeholder" ${p.photo ? 'style="display:none"' : ""}>${CAT_EMOJI[p.cat] || "🍴"}</div>`;

    const suburb = getSuburb(p.address);
    const rev = REVIEWS[p.name] || {};

    const googleRatingHtml = p.rating
      ? `<span class="rating" title="Google rating">
           <span class="rating-star">★</span>
           ${p.rating}
           ${p.ratingCount ? `<span class="rating-count">(${p.ratingCount >= 1000 ? (p.ratingCount/1000).toFixed(1)+"k" : p.ratingCount})</span>` : ""}
           <span class="personal-rating-label">Google</span>
         </span>`
      : "";

    const personalRatings = rev.ratings || [];
    const personalAvg = personalRatings.length
      ? (personalRatings.reduce((s, r) => s + r.score, 0) / personalRatings.length).toFixed(1)
      : null;
    const personalRatingHtml = personalAvg
      ? `<span class="personal-rating" title="LL&Friends rating">
           ❤️ ${personalAvg}
           <span class="personal-rating-label">LL&Friends</span>
         </span>`
      : "";

    const ratingHtml = (googleRatingHtml || personalRatingHtml)
      ? `<div class="card-ratings">
           ${googleRatingHtml}
           ${googleRatingHtml && personalRatingHtml ? '<div class="rating-divider"></div>' : ""}
           ${personalRatingHtml}
         </div>`
      : "";

    const priceHtml = p.priceLevel != null
      ? `<span class="price">${price(p.priceLevel)}</span>`
      : "";
    const status = rev.status || "";
    const badgeIcon = status === "visited" ? "✅" : status === "want" ? "🔖" : "";
    const toggleIcon = status === "visited" ? "✅" : status === "want" ? "🔖" : "＋";
    const toggleTitle = status === "visited" ? "Visited" : status === "want" ? "Want to go" : "Mark this place";
    const cardClick = (editMode || status === "visited")
      ? `openDrawer('${p.name.replace(/'/g, "\\'")}')`
      : `focusSuburb('${suburb.replace(/'/g, "\\'")}')`;

    return `
      <div class="card status-${status}" id="card-${slugify(p.name)}" onclick="${cardClick}">
        ${badgeIcon ? `<div class="card-badge">${badgeIcon}</div>` : ""}
        ${photo}${placeholder}
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          ${p.address ? `<div class="card-address">${shortAddr(p.address)}</div>` : ""}
          <div class="card-meta">${ratingHtml}${priceHtml}</div>
        </div>
        <div class="card-footer">
          <span class="cat-tag c-${p.cat}">${CAT_LABEL[p.cat]}</span>
          <div class="card-links" onclick="event.stopPropagation()">
            ${editMode ? `<button class="toggle-btn" onclick="cycleStatus('${p.name.replace(/'/g, "\\'")}', event)" title="${toggleTitle}">${toggleIcon}</button>` : ""}
            ${p.website ? `<a class="maps-btn" href="${p.website}" target="_blank" rel="noopener" title="Official website">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              Website
            </a>` : ""}
            ${p.instagram ? `<a class="maps-btn insta-btn" href="https://instagram.com/${p.instagram}" target="_blank" rel="noopener" title="Instagram">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
              Instagram
            </a>` : ""}
            <a class="maps-btn" href="${mapsHref(p)}" target="_blank" rel="noopener" title="Google Maps">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              Maps
            </a>
            <button class="maps-btn" onclick="sharePlace('${p.name.replace(/'/g, "\\'")}', event)" title="Share">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share
            </button>
          </div>
        </div>
      </div>`;
  }).join("");
}

let ALL = [];
let REVIEWS = {};
let leafletMap = null;
let mapMarkers = {};

Promise.all([
  fetch("data/places.json").then(r => r.json()),
  loadReviews(),
  loadCustomPlaces(),
  loadHiddenPlaces(),
]).then(([places, reviews, custom, hidden]) => {
  ALL = [...places, ...custom].filter(p => !hidden.has(p.name));
  REVIEWS = reviews;
  buildFilters();
  buildStatusFilters();
  buildSuburbSelect();
  render();
  initMap();
  handleShareParam();

// ── GALLERY ───────────────────────────────────────────────────────────────
function renderGallery() {
  const items = [];
  Object.entries(REVIEWS).forEach(([name, rev]) => {
    (rev.photos || []).filter(Boolean).forEach(url => items.push({ name, url }));
  });

  const gallery = document.getElementById('gallery-grid');
  if (!items.length) {
    gallery.innerHTML = '<div class="gallery-empty">📷 No photos yet — add reviews with photos to see them here.</div>';

  gallery.innerHTML = items.map(({ name, url }) =>
    `<div class="gallery-item" onclick="galleryClick('${name.replace(/'/g, "\\'")}')">
       <img src="${url}" alt="${name}" loading="lazy">
       <div class="gallery-item-label">${name}</div>
     </div>`
  ).join('');
}

function galleryClick(name) {
  const p = ALL.find(x => x.name === name);

  if (p) {

}

function makePinIcon(suburb, cats, isActive, isDimmed) {
  const emojis = cats.slice(0, 4).map(c => CAT_EMOJI[c] || "🍴").join("");
  const cls = ["map-pin", isActive ? "active" : "", isDimmed ? "dimmed" : ""].filter(Boolean).join(" ");
  const html = `<div class="${cls}">
    <div class="pin-emojis">${emojis}</div>
    <div class="pin-label">${suburb}</div>
  </div>`;
  return L.divIcon({ className: "", html, iconSize: null, iconAnchor: [36, 52] });
}

function initMap() {
  // Group ALL places by suburb → unique categories
  const suburbCats = {};
  ALL.forEach(p => {
    const s = getSuburb(p.address);
    if (!s || !SUBURB_COORDS[s]) return;
    if (!suburbCats[s]) suburbCats[s] = [];
    if (!suburbCats[s].includes(p.cat)) suburbCats[s].push(p.cat);
  });

  leafletMap = L.map("map", {
    center: [-33.865, 151.170],
    zoom: 12,
    zoomControl: true,
    scrollWheelZoom: false,
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 17,
  }).addTo(leafletMap);

  Object.entries(suburbCats).forEach(([suburb, cats]) => {
    const coords = SUBURB_COORDS[suburb];
    if (!coords) return;
    const marker = L.marker(coords, {
      icon: makePinIcon(suburb, cats, false),
      zIndexOffset: 0,
    }).addTo(leafletMap);

    marker.on("click", () => {
      const sel = document.getElementById("suburb");
      sel.value = sel.value === suburb ? "" : suburb;
      render();
      // Scroll back to top of grid on mobile
      if (window.innerWidth < 1000) {
        document.querySelector("main").scrollIntoView({ behavior: "smooth" });
      }
    });

    mapMarkers[suburb] = { marker, cats };
  });
}

function updateMapMarkers() {
  const activeSuburb = document.getElementById("suburb").value;
  Object.entries(mapMarkers).forEach(([suburb, { marker, cats }]) => {
    const isActive   = suburb === activeSuburb;
    // Which cats are visible under the current category filter?
    const visibleCats = activeFilter === "all"
      ? cats
      : cats.filter(c => c === activeFilter);
    const isDimmed = activeFilter !== "all" && visibleCats.length === 0;
    // Show filtered emoji when a category is active, else all emojis
    const displayCats = visibleCats.length > 0 ? visibleCats : cats;
    marker.setIcon(makePinIcon(suburb, displayCats, isActive, isDimmed));
    marker.setZIndexOffset(isActive ? 1000 : isDimmed ? -200 : 0);
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────
function mapsHref(p) {
  const pid = p.mapsUrl ? (p.mapsUrl.split('place_id:')[1] || '') : '';
  const base = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}`;
  return pid ? base + `&query_place_id=${pid}` : base;
}

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}

// ── CYCLE STATUS (toggle button) ─────────────────────────────────────────
function cycleStatus(name, e) {
  e.stopPropagation();
  const rev = REVIEWS[name] || {};
  const cur = rev.status || "";
  const next = cur === "" ? "want" : cur === "want" ? "visited" : "";
  if (next) {
    REVIEWS[name] = { ...rev, status: next };
  } else {
    const { status: _, ...rest } = rev;
    REVIEWS[name] = Object.keys(rest).length ? rest : undefined;
    if (!REVIEWS[name]) delete REVIEWS[name];
  }
  if (editMode) saveReview(name, REVIEWS[name] || {});
  render();
}

function starsDisplay(score) {
  const n = Math.round(score);
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

// ── SHARE ────────────────────────────────────────────────────────────────
function sharePlace(name, e) {
  e.stopPropagation();
  const slug = slugify(name);
  const url = `${location.origin}${location.pathname}?place=${slug}`;

  if (navigator.share) {
    navigator.share({ title: name, text: `Check out ${name} on Lihan's Sydney Foodie Guide`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast("Link copied!"));
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ── SHARE URL PARAM ──────────────────────────────────────────────────────
function handleShareParam() {
  const slug = new URLSearchParams(location.search).get("place");
  if (!slug) return;
  const card = document.getElementById(`card-${slug}`);
  if (!card) return;
  card.scrollIntoView({ behavior: "smooth", block: "center" });
  card.style.outline = `3px solid var(--accent)`;
  setTimeout(() => card.style.outline = "", 2500);
}

function focusSuburb(suburb) {
  if (!leafletMap || !suburb || !SUBURB_COORDS[suburb]) return;
  // Show map if hidden
  const body = document.getElementById("map-body");
  if (body.style.display === "none") toggleMap();
  // Fly to suburb
  leafletMap.flyTo(SUBURB_COORDS[suburb], 15, { duration: 0.8 });
  // Highlight the marker briefly
  if (mapMarkers[suburb]) {
    const { marker } = mapMarkers[suburb];
    marker.setZIndexOffset(2000);
    setTimeout(() => marker.setZIndexOffset(0), 2000);
  }
}

function toggleMap() {
  const body = document.getElementById("map-body");
  const btn = document.getElementById("map-toggle");
  const hidden = body.style.display === "none";
  body.style.display = hidden ? "" : "none";
  btn.textContent = hidden ? "Hide" : "Show map";
  if (hidden && leafletMap) leafletMap.invalidateSize();
}

// ── SUPABASE ──────────────────────────────────────────────────────────────
async function loadReviews() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?select=*`, {
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    const rows = await res.json();
    const obj = {};
    rows.forEach(r => {
      const rev = {};
      if (r.status)       rev.status = r.status;
      if (r.visited_date) rev.date   = r.visited_date;
      if (r.note)         rev.note   = r.note;
      rev.dishes  = r.dishes  || [];
      rev.photos  = r.photos  || [];
      rev.ratings = r.ratings || [];
      obj[r.place_name] = rev;
    });
    return obj;
  } catch(e) {
    console.warn('Could not load reviews from Supabase', e);
    return {};
  }
}

async function saveReview(placeName, data) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/reviews`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_ANON,
        Authorization: `Bearer ${SUPABASE_ANON}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates',
      },
      body: JSON.stringify({
        place_name:   placeName,
        status:       data.status || null,
        visited_date: data.date   || null,
        note:         data.note   || null,
        dishes:       data.dishes   || [],
        photos:       data.photos   || [],
        ratings:      data.ratings  || [],
      }),
    });
  } catch(e) {
    console.warn('Save failed', e);
    throw e;
  }
}

async function saveNewPlace() {

  const data = {

    cat:       document.getElementById('new-cat').value,
    address:   document.getElementById('new-address').value.trim(),

async function loadHiddenPlaces() {

    const res = await fetch(`${SUPABASE_URL}/rest/v1/hidden_places?select=place_name`, {
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    const rows = await res.json();
    return new Set(Array.isArray(rows) ? rows.map(r => r.place_name) : []);
  } catch(e) {
    return new Set();
  }

async function removePlace(name, isCustom) {
  if (!confirm(`Remove "${name}" from the list? This cannot be undone.`)) return;
  try {
    if (isCustom) {
      await fetch(`${SUPABASE_URL}/rest/v1/custom_places?name=eq.${encodeURIComponent(name)}`, {
        method: 'DELETE',
        headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` },
      });
    } else {
      await fetch(`${SUPABASE_URL}/rest/v1/hidden_places`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_ANON,
          Authorization: `Bearer ${SUPABASE_ANON}`,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates',
        },
        body: JSON.stringify({ place_name: name }),
      });
    }
    ALL = ALL.filter(p => p.name !== name);
    closeDrawer();
    buildSuburbSelect();
    render();
    showToast(`"${name}" removed`);
  } catch(e) {
    showToast('Remove failed — try again');
  }
}

async function uploadPhoto(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLD_PRESET);
  fd.append('folder', 'foodie_sydney');
  const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`, { method: 'POST', body: fd });

  if (!data.secure_url) throw new Error('Upload failed');
  return data.secure_url;

// ── PASSWORD / EDIT MODE ──────────────────────────────────────────────────
async function hashPassword(pwd) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function promptPassword() {
  if (editMode) { exitEditMode(); return; }
  document.getElementById('pwd-modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
}

async function submitPassword() {
  const input = document.getElementById('pwd-input');
  const hash  = await hashPassword(input.value);
  if (hash === EDIT_HASH) {
    sessionStorage.setItem('editMode', '1');
    document.getElementById('pwd-modal-overlay').classList.remove('open');
    enterEditMode();
  } else {
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    input.value = '';
    input.focus();
  }
}

function enterEditMode() {

  const statusVal = rev.status || '';
  const radio = document.querySelector(`input[name="edit-status"][value="${statusVal}"]`);
  if (radio) radio.checked = true;

  (rev.ratings || []).forEach(r => addRatingRow(r));
  (rev.dishes  || []).forEach(d => addDishRow(d));
  renderPhotoThumbs();
}

function addDishRow(dish = {}) {
  const row = document.createElement('div');
  row.className = 'dish-edit-row';
  row.innerHTML = `
    <input type="text" placeholder="Dish name" value="${(dish.name || '').replace(/"/g, '&quot;')}" class="dish-name-input">
    <select class="dish-verdict-select">
      <option value="must" ${dish.verdict === 'must' ? 'selected' : ''}>🔥 Must</option>
      <option value="okay" ${dish.verdict === 'okay' ? 'selected' : ''}>👍 Okay</option>
      <option value="skip" ${dish.verdict === 'skip' ? 'selected' : ''}>👎 Skip</option>
    </select>
    <input type="text" placeholder="Note (optional)" value="${(dish.note || '').replace(/"/g, '&quot;')}" class="dish-note-input">
    <button class="remove-dish" onclick="this.closest('.dish-edit-row').remove()">✕</button>
  `;
  document.getElementById('dish-editor').appendChild(row);
}

function addRatingRow(rating = {}) {
  const score = rating.score || 0;
  const idx   = document.querySelectorAll('.rating-edit-row').length;
  const row   = document.createElement('div');
  row.className = 'rating-edit-row';
  row.innerHTML = `
    <div class="rating-top">
      <span class="from-label">From</span>
      <input type="text" placeholder="Name (e.g. Lihan)" class="rater-name-input"
             value="${(rating.name || '').replace(/"/g, '&quot;')}" style="flex:1">
      <div class="star-picker" id="sp-${idx}" data-score="${score}">
        ${[1,2,3,4,5].map(v =>
          `<span class="sp-star${v <= score ? ' on' : ''}" data-val="${v}" onclick="clickStar(this)">★</span>`
        ).join('')}
      </div>
      <button class="remove-dish" onclick="this.closest('.rating-edit-row').remove()">✕</button>
    </div>
    <input type="text" placeholder="Highlight dish (optional, e.g. Tonkotsu Ramen)"
           class="rater-dish-input" value="${(rating.dish || '').replace(/"/g, '&quot;')}">
  `;
  document.getElementById('ratings-editor').appendChild(row);
}

function clickStar(el) {
  const picker = el.closest('.star-picker');
  const val    = parseInt(el.dataset.val);
  picker.dataset.score = val;
  picker.querySelectorAll('.sp-star').forEach(s => {
    s.classList.toggle('on', parseInt(s.dataset.val) <= val);
  });
}

function renderPhotoThumbs() {
  const container = document.getElementById('photo-thumbs');
  if (!container) return;
  container.innerHTML = editPhotos.map((url, i) =>
    url ? `<div class="photo-thumb-wrap" id="thumb-${i}">
      <img src="${url}" alt="photo">
      <button class="remove-photo" onclick="removeEditPhoto(${i})">✕</button>
    </div>` : `<div class="photo-thumb-wrap uploading" id="thumb-${i}"><img src="" alt=""></div>`
  ).join('');
}

function removeEditPhoto(i) {
  editPhotos.splice(i, 1);
  renderPhotoThumbs();
}

async function handlePhotoUpload(e) {
  const files = Array.from(e.target.files);
  for (const file of files) {
    const idx = editPhotos.length;
    editPhotos.push('');
    renderPhotoThumbs();
    try {
      const url = await uploadPhoto(file);
      editPhotos[idx] = url;
    } catch {
      editPhotos.splice(idx, 1);
      showToast('Upload failed, try again');
    }
    renderPhotoThumbs();
  }
  e.target.value = '';
}

async function saveEditForm(name) {
  const statusRadio = document.querySelector('input[name="edit-status"]:checked');
  const status = statusRadio ? statusRadio.value : '';
  const date   = (document.getElementById('edit-date').value || '').trim();
  const note   = (document.getElementById('edit-note').value || '').trim();

  const ratings = Array.from(document.querySelectorAll('.rating-edit-row')).map(row => ({
    name:  row.querySelector('.rater-name-input').value.trim(),
    score: parseInt(row.querySelector('.star-picker').dataset.score) || 0,
    dish:  row.querySelector('.rater-dish-input').value.trim(),
  })).filter(r => r.name && r.score > 0);

  const dishes = Array.from(document.querySelectorAll('.dish-edit-row')).map(row => ({
    name:    row.querySelector('.dish-name-input').value.trim(),
    verdict: row.querySelector('.dish-verdict-select').value,
    note:    row.querySelector('.dish-note-input').value.trim(),
  })).filter(d => d.name);

  const data = { status, date, note, ratings, dishes, photos: editPhotos.filter(Boolean) };
  REVIEWS[name] = data;
  if (!status && !note && !dishes.length && !data.photos.length) delete REVIEWS[name];

  try {
    await saveReview(name, data);
    showToast('Saved!');
  } catch {
    showToast('Save failed — check connection');
  }

  render();
  openDrawer(name);
}

</script>
