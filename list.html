<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lihan's Sydney Foodie List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e8ddd0;
      --text: #2a1f14;
      --text-muted: #9a8070;
      --brown: #5c3d1e;
      --accent: #c87941;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    header {
      background: rgba(250, 247, 242, 0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .nav-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      gap: 12px;
    }

    .nav-logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--brown);
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .nav-home {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-home:hover { color: var(--brown); }

    .nav-controls {
      padding: 0 24px 0;
      border-top: 1px solid var(--border);
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      max-width: 380px;
      padding: 12px 0 10px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    input[type=search] {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      transition: border-color .15s, background .15s;
    }

    input[type=search]:focus {
      border-color: var(--accent);
      background: #fff;
    }

    /* ── FILTER PILLS ── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
    }

    .filters {
      display: flex;
      gap: 7px;
      flex-wrap: nowrap;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }
    .pill:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    /* Category colours */
    .pill[data-cat="all"]        { --c: #c87941; }
    .pill[data-cat="japanese"]   { --c: #e8570a; }
    .pill[data-cat="chinese"]    { --c: #d42b2b; }
    .pill[data-cat="korean"]     { --c: #8b2be2; }
    .pill[data-cat="thai"]       { --c: #c49600; }
    .pill[data-cat="vietnamese"] { --c: #0d8c4a; }
    .pill[data-cat="malaysian"]  { --c: #0077b6; }
    .pill[data-cat="indian"]     { --c: #c05a00; }
    .pill[data-cat="cafe"]       { --c: #6d4c41; }
    .pill[data-cat="bakery"]     { --c: #d4548a; }
    .pill[data-cat="tea"]        { --c: #2a9d6a; }
    .pill[data-cat="western"]    { --c: #455a64; }

    .pill:hover { border-color: var(--c); color: var(--c); }
    .pill.active {
      background: var(--c);
      border-color: var(--c);
      color: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,.18);
    }

    /* ── SUBURB DROPDOWN ── */
    .suburb-select-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .suburb-select-wrap::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    select#suburb {
      appearance: none;
      -webkit-appearance: none;
      padding: 6px 28px 6px 12px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      outline: none;
      transition: border-color .15s, color .15s;
      white-space: nowrap;
    }
    select#suburb:focus, select#suburb:hover { border-color: var(--accent); color: var(--text); }
    select#suburb.active { border-color: var(--accent); color: var(--brown); background: #fdf0e3; }



    /* ── MAIN GRID ── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .15s;
      cursor: pointer;
    }

    .card:hover {
      box-shadow: 0 8px 24px rgba(92,61,30,.12);
      transform: translateY(-2px);
    }

    .card-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .card-photo-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #ede9e0 0%, #d8d4cc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }

    .card-body {
      padding: 13px 14px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-name {
      font-size: 0.9rem;
      font-weight: 650;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .card-address {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.35;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 8px;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .rating-star {
      color: #f5a623;
      font-size: 0.75rem;
    }

    .rating-count {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .price {
      font-size: 0.78rem;
      font-weight: 600;
      color: #2a8a4a;
    }

    .card-footer {
      padding: 0 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cat-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.01em;
    }

    .maps-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #4285f4;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1.5px solid #4285f4;
      transition: background .15s, color .15s;
    }

    .maps-btn:hover {
      background: #4285f4;
      color: #fff;
    }

    /* Category colours */
    .c-japanese   { background:#fff0e6; color:#b85700; }
    .c-chinese    { background:#fff0f0; color:#c03030; }
    .c-korean     { background:#f8f0ff; color:#7b30c0; }
    .c-thai       { background:#fffce0; color:#8a7000; }
    .c-vietnamese { background:#edfff4; color:#1a7a40; }
    .c-malaysian  { background:#e8f6ff; color:#0060a0; }
    .c-indian     { background:#fff5e6; color:#a85200; }
    .c-cafe       { background:#f5ede4; color:#5c3518; }
    .c-bakery     { background:#fff0eb; color:#b85020; }
    .c-tea        { background:#edfaf4; color:#1a6644; }
    .c-western    { background:#f2f2f0; color:#444; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 40px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      display: none;
    }

    .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .nav-top { padding: 14px 16px; }
      .nav-controls { padding: 0 16px; }
      main { padding: 14px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: 1fr; }
    }


    /* ── PAGE BODY SPLIT ── */
    .page-body {
      display: flex;
      align-items: flex-start;
      max-width: 1600px;
      margin: 0 auto;
    }

    main {
      flex: 1;
      min-width: 0;
      padding: 20px;
    }

    /* ── MAP PANEL ── */
    .map-panel {
      width: 340px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      padding: 16px 16px 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-panel-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-left: 2px;
    }

    #map {
      width: 100%;
      height: 560px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(92,61,30,.10);
      overflow: hidden;
    }

    .map-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── MAP PIN MARKERS ── */
    .map-pin {
      background: #fff;
      border: 2px solid var(--border, #e8ddd0);
      border-radius: 12px;
      padding: 5px 8px 3px;
      box-shadow: 0 2px 8px rgba(92,61,30,.15);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
      text-align: center;
      white-space: nowrap;
      transform-origin: bottom center;
    }
    .map-pin:hover {
      transform: translateY(-2px) scale(1.06);
      box-shadow: 0 5px 16px rgba(92,61,30,.25);
      border-color: #c87941;
    }
    .map-pin.active {
      background: #c87941;
      border-color: #c87941;
      box-shadow: 0 4px 14px rgba(200,121,65,.45);
    }
    .map-pin.active .pin-label { color: rgba(255,255,255,.85); }
    .map-pin.dimmed {
      opacity: 0.2;
      transform: scale(0.8);
      pointer-events: none;
    }
    .pin-emojis { font-size: 1.05rem; line-height: 1.25; }
    .pin-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #9a8070;
      margin-top: 1px;
      line-height: 1.2;
    }

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-container { font-family: inherit; background: #faf7f2; }
    .leaflet-control-attribution { font-size: 0.6rem !important; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1000px) {
      .page-body { flex-direction: column; }
      .map-panel {
        width: 100%;
        position: static;
        padding: 0 14px 20px;
        order: -1;
      }
      #map { height: 300px; }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<header>
  <div class="nav-top">
    <a class="nav-logo" href="index.html">🍜 Lihan's Sydney</a>
    <div class="nav-right">
      <span class="header-sub" id="count"></span>
      <a class="nav-home" href="index.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Home
      </a>
    </div>
  </div>
  <div class="nav-controls">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search" placeholder="Search places…" oninput="render()">
    </div>
    <div class="filter-row">
      <div class="filters" id="filters"></div>
      <div class="suburb-select-wrap">
        <select id="suburb" onchange="render()">
          <option value="">📍 All areas</option>
        </select>
      </div>
    </div>
  </div>
</header>

<div class="page-body">
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">
      <div class="empty-icon">🔍</div>
      No places found.
    </div>
  </main>
  <aside class="map-panel">
    <p class="map-panel-title">📍 Sydney Map</p>
    <div id="map"></div>
    <p class="map-hint">Click a suburb to filter &nbsp;·&nbsp; click again to clear</p>
  </aside>
</div>

<script>


const CATS = [
  { id:"all",        label:"All" },
  { id:"japanese",   label:"🍜 Japanese" },
  { id:"chinese",    label:"🥢 Chinese" },
  { id:"korean",     label:"🥩 Korean" },
  { id:"thai",       label:"🌶️ Thai" },
  { id:"vietnamese", label:"🥖 Vietnamese" },
  { id:"malaysian",  label:"🍛 Malaysian" },
  { id:"indian",     label:"🫓 Indian" },
  { id:"cafe",       label:"☕ Cafe" },
  { id:"bakery",     label:"🥐 Bakery" },
  { id:"tea",        label:"🧋 Tea & Drinks" },
  { id:"western",    label:"🍽️ Western" },
];

const CAT_LABEL = {
  japanese:"Japanese", chinese:"Chinese", korean:"Korean",
  thai:"Thai", vietnamese:"Vietnamese", malaysian:"Malaysian",
  indian:"Indian", cafe:"Cafe", bakery:"Bakery", tea:"Tea & Drinks", western:"Western",
};

const CAT_EMOJI = {
  japanese:"🍜", chinese:"🥢", korean:"🥩", thai:"🌶️",
  vietnamese:"🥖", malaysian:"🍛", indian:"🫓",
  cafe:"☕", bakery:"🥐", tea:"🧋", western:"🍽️",
};

let activeFilter = "all";

function stars(r) {
  if (!r) return "";
  const full = Math.floor(r);
  const half = r - full >= 0.3 ? 1 : 0;
  const empty = 5 - full - half;
  return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty);
}

function price(p) {
  if (p == null) return "";
  return "$".repeat(p + 1);
}

function shortAddr(addr) {
  if (!addr) return "";
  return addr.replace(", Australia", "").replace(", NSW", "").replace(" NSW", "");
}

function getSuburb(addr) {
  if (!addr) return "";
  const m = addr.match(/,\s*([^,]+?)\s+NSW\s+\d/);
  return m ? m[1].trim() : "";
}

function buildFilters() {
  document.getElementById("filters").innerHTML = CATS.map(c =>
    `<button class="pill${c.id === activeFilter ? " active" : ""}" data-cat="${c.id}" onclick="setFilter('${c.id}')">${c.label}</button>`
  ).join("");
}

function buildSuburbSelect() {
  const sel = document.getElementById("suburb");
  const current = sel.value;
  const suburbs = [...new Set(ALL.map(p => getSuburb(p.address)).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">📍 All areas</option>' +
    suburbs.map(s => `<option value="${s}"${s === current ? " selected" : ""}>${s}</option>`).join("");
}

function setFilter(id) {
  activeFilter = id;
  buildFilters();
  render();
}

function render() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const suburb = document.getElementById("suburb").value;
  const list = ALL.filter(p => {
    const matchCat = activeFilter === "all" || p.cat === activeFilter;
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.address || "").toLowerCase().includes(q);
    const matchSuburb = !suburb || getSuburb(p.address) === suburb;
    return matchCat && matchQ && matchSuburb;
  });
  document.getElementById("suburb").className = suburb ? "active" : "";
  if (leafletMap) updateMapMarkers();

  document.getElementById("count").textContent = list.length + " places";

  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  if (!list.length) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  grid.innerHTML = list.map(p => {
    const photo = p.photo
      ? `<img class="card-photo" src="${p.photo}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : "";
    const placeholder = `<div class="card-photo-placeholder" ${p.photo ? 'style="display:none"' : ""}>${CAT_EMOJI[p.cat] || "🍴"}</div>`;

    const ratingHtml = p.rating
      ? `<span class="rating">
           <span class="rating-star">★</span>
           ${p.rating}
           ${p.ratingCount ? `<span class="rating-count">(${p.ratingCount >= 1000 ? (p.ratingCount/1000).toFixed(1)+"k" : p.ratingCount})</span>` : ""}
         </span>`
      : "";

    const priceHtml = p.priceLevel != null
      ? `<span class="price">${price(p.priceLevel)}</span>`
      : "";

    return `
      <div class="card" onclick="window.open('${p.mapsUrl}','_blank')">
        ${photo}${placeholder}
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          ${p.address ? `<div class="card-address">${shortAddr(p.address)}</div>` : ""}
          <div class="card-meta">${ratingHtml}${priceHtml}</div>
        </div>
        <div class="card-footer">
          <span class="cat-tag c-${p.cat}">${CAT_LABEL[p.cat]}</span>
          <a class="maps-btn" href="${p.mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Maps
          </a>
        </div>
      </div>`;
  }).join("");
}

let ALL = [];
let leafletMap = null;
let mapMarkers = {};

fetch("data/places.json")
  .then(r => r.json())
  .then(data => {
    ALL = data;
    buildFilters();
    buildSuburbSelect();
    render();
  });

// ── SUBURB COORDINATES (approximate) ────────────────────────────────────
const SUBURB_COORDS = {
  "Alexandria":     [-33.909, 151.197],
  "Artarmon":       [-33.819, 151.189],
  "Barangaroo":     [-33.862, 151.200],
  "Botany":         [-33.944, 151.202],
  "Burwood":        [-33.877, 151.104],
  "Cabramatta":     [-33.894, 150.939],
  "Chatswood":      [-33.797, 151.182],
  "Chippendale":    [-33.889, 151.198],
  "Crows Nest":     [-33.827, 151.200],
  "Darling Harbour":[-33.873, 151.199],
  "Darlinghurst":   [-33.876, 151.219],
  "Eastwood":       [-33.790, 151.081],
  "Erskineville":   [-33.900, 151.185],
  "Glebe":          [-33.880, 151.186],
  "Haymarket":      [-33.880, 151.204],
  "Mascot":         [-33.927, 151.191],
  "Neutral Bay":    [-33.834, 151.221],
  "Newtown":        [-33.897, 151.177],
  "North Sydney":   [-33.840, 151.207],
  "Potts Point":    [-33.870, 151.226],
  "Redfern":        [-33.893, 151.201],
  "St Leonards":    [-33.822, 151.195],
  "Surry Hills":    [-33.885, 151.212],
  "Sydney":         [-33.869, 151.207],
  "The Rocks":      [-33.860, 151.208],
  "Ultimo":         [-33.881, 151.197],
  "Waterloo":       [-33.897, 151.202],
  "Zetland":        [-33.911, 151.207],
};

function makePinIcon(suburb, cats, isActive, isDimmed) {
  const emojis = cats.slice(0, 4).map(c => CAT_EMOJI[c] || "🍴").join("");
  const cls = ["map-pin", isActive ? "active" : "", isDimmed ? "dimmed" : ""].filter(Boolean).join(" ");
  const html = `<div class="${cls}">
    <div class="pin-emojis">${emojis}</div>
    <div class="pin-label">${suburb}</div>
  </div>`;
  return L.divIcon({ className: "", html, iconSize: null, iconAnchor: [36, 52] });
}

function initMap() {
  // Group ALL places by suburb → unique categories
  const suburbCats = {};
  ALL.forEach(p => {
    const s = getSuburb(p.address);
    if (!s || !SUBURB_COORDS[s]) return;
    if (!suburbCats[s]) suburbCats[s] = [];
    if (!suburbCats[s].includes(p.cat)) suburbCats[s].push(p.cat);
  });

  leafletMap = L.map("map", {
    center: [-33.865, 151.170],
    zoom: 12,
    zoomControl: true,
    scrollWheelZoom: false,
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 17,
  }).addTo(leafletMap);

  Object.entries(suburbCats).forEach(([suburb, cats]) => {
    const coords = SUBURB_COORDS[suburb];
    if (!coords) return;
    const marker = L.marker(coords, {
      icon: makePinIcon(suburb, cats, false),
      zIndexOffset: 0,
    }).addTo(leafletMap);

    marker.on("click", () => {
      const sel = document.getElementById("suburb");
      sel.value = sel.value === suburb ? "" : suburb;
      render();
      // Scroll back to top of grid on mobile
      if (window.innerWidth < 1000) {
        document.querySelector("main").scrollIntoView({ behavior: "smooth" });
      }
    });

    mapMarkers[suburb] = { marker, cats };
  });
}

function updateMapMarkers() {
  const activeSuburb = document.getElementById("suburb").value;
  Object.entries(mapMarkers).forEach(([suburb, { marker, cats }]) => {
    const isActive   = suburb === activeSuburb;
    // Which cats are visible under the current category filter?
    const visibleCats = activeFilter === "all"
      ? cats
      : cats.filter(c => c === activeFilter);
    const isDimmed = activeFilter !== "all" && visibleCats.length === 0;
    // Show filtered emoji when a category is active, else all emojis
    const displayCats = visibleCats.length > 0 ? visibleCats : cats;
    marker.setIcon(makePinIcon(suburb, displayCats, isActive, isDimmed));
    marker.setZIndexOffset(isActive ? 1000 : isDimmed ? -200 : 0);
  });
}

// Init map after page loads
window.addEventListener("load", () => {
  initMap();
  // Sync sticky top with header height
  const hh = document.querySelector("header").offsetHeight;
  document.querySelector(".map-panel").style.top = hh + "px";
});

</script>
